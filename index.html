<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <button id="todayBtn" class="today-btn">
        <span class="cal-glyph" aria-hidden="true">&#128197;</span> Today
      </button>
      <div class="nav">
        <button id="prevBtn" class="nav-btn" aria-label="Previous month">&#8249;</button>
        <button id="nextBtn" class="nav-btn" aria-label="Next month">&#8250;</button>
      </div>
      <h1 id="monthTitle" class="month-title">Month YYYY</h1>
    </header>

    <div id="weekdays" class="weekdays" aria-hidden="true">
      <div><span class="wd-full">Sunday</span><span class="wd-short">Sun</span></div>
      <div><span class="wd-full">Monday</span><span class="wd-short">Mon</span></div>
      <div><span class="wd-full">Tuesday</span><span class="wd-short">Tue</span></div>
      <div><span class="wd-full">Wednesday</span><span class="wd-short">Wed</span></div>
      <div><span class="wd-full">Thursday</span><span class="wd-short">Thu</span></div>
      <div><span class="wd-full">Friday</span><span class="wd-short">Fri</span></div>
      <div><span class="wd-full">Saturday</span><span class="wd-short">Sat</span></div>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <!-- Add / Edit event modal -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle" class="modal-title">Add Event</h2>
      <form id="eventForm" novalidate>
        <input type="hidden" id="eventId">

        <label for="eventDate">Date</label>
        <input type="date" id="eventDate" required>

        <label for="eventTitle">Title</label>
        <input type="text" id="eventTitle" maxlength="80" placeholder="Event title" required>

        <label for="eventTime">Time <span class="optional">(optional)</span></label>
        <input type="time" id="eventTime">

        <label for="eventDesc">Description <span class="optional">(optional)</span></label>
        <textarea id="eventDesc" rows="3" maxlength="500" placeholder="Details"></textarea>

        <p id="formError" class="form-error" role="alert"></p>

        <div class="modal-actions">
          <button type="button" id="deleteBtn" class="btn btn-danger hidden">Delete</button>
          <span class="spacer"></span>
          <button type="button" id="cancelBtn" class="btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
